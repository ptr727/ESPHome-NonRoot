name: Build project release task

# Orchestrate one branch's release: validate, version once (get-version), build the Docker image, then create the
# GitHub release. github/dockerhub gate the two publish targets; smoke builds the image, publishes nothing.
on:
  workflow_call:
    inputs:
      github:
        required: false
        type: boolean
        default: false
      dockerhub:
        required: false
        type: boolean
        default: false
      # Git ref to check out / version (empty = default checkout ref).
      ref:
        required: false
        type: string
        default: ''
      # Drives tags/prerelease: main => latest/non-prerelease, else develop. Required (see header).
      branch:
        required: true
        type: string
      # Smoke: reduced, never-published build for PR feedback; hard-disables every push below.
      smoke:
        required: false
        type: boolean
        default: false

jobs:

  # Validate the branch being published (lint), gating the build/publish below. Skipped on smoke: the PR runs its
  # own validate job, so a smoke build does not double-validate.
  validate:
    name: Validate job
    if: ${{ !inputs.smoke }}
    uses: ./.github/workflows/validate-task.yml
    with:
      ref: ${{ inputs.ref }}

  get-version:
    name: Get version information job
    uses: ./.github/workflows/get-version-task.yml
    secrets: inherit
    with:
      ref: ${{ inputs.ref }}

  # Build only when validation passed (success) or was skipped (smoke); never when it failed.
  build-docker:
    name: Build Docker job
    needs: [get-version, validate]
    if: ${{ !cancelled() && needs.get-version.result == 'success' && (needs.validate.result == 'success' || needs.validate.result == 'skipped') }}
    uses: ./.github/workflows/build-docker-task.yml
    secrets: inherit
    with:
      # Pin to the resolved commit so the image matches the release tag, and thread the single NBGV version.
      ref: ${{ needs.get-version.outputs.GitCommitId }}
      branch: ${{ inputs.branch }}
      smoke: ${{ inputs.smoke }}
      semver2: ${{ needs.get-version.outputs.SemVer2 }}
      # Push to Docker Hub, never on a smoke build.
      push: ${{ inputs.dockerhub && !inputs.smoke }}

  github-release:
    name: Publish GitHub release job
    # !smoke enforces "smoke never publishes" even if a smoke caller set github: true.
    if: ${{ inputs.github && !inputs.smoke }}
    runs-on: ubuntu-latest
    needs: [get-version, build-docker]

    steps:

      # Check out the exact built commit so the uploaded release files match the tag even if the branch advances mid-run.
      - name: Checkout code step
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.get-version.outputs.GitCommitId }}

      # Backstop (main only): refuse to publish if the public version carries a prerelease '-' (NBGV mis-versioning).
      # Strip '+buildmetadata' first; only a '-' in the core segment marks a prerelease.
      - name: Verify public release version step
        if: ${{ inputs.branch == 'main' }}
        env:
          SEMVER2: ${{ needs.get-version.outputs.SemVer2 }}
        run: |
          set -euo pipefail
          CORE_AND_PRE="${SEMVER2%%+*}"   # drop +buildmetadata; a '-' here is the genuine prerelease separator
          if [[ "$CORE_AND_PRE" == *-* ]]; then
            echo "::error::Public (main) release version '$SEMVER2' carries a prerelease suffix; refusing to publish."
            exit 1
          fi

      # Collect any release-asset-<branch>-* artifacts. The Docker target pushes directly and uploads none, so this
      # matches nothing (which succeeds) and the release carries just the tag + LICENSE/README.
      - name: Download release asset artifacts step
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-asset-${{ inputs.branch }}-*
          merge-multiple: true
          path: ./Publish

      # Weekly re-runs may hit an already-released version; skip release-create when the tag exists (no-op republish).
      - name: Check for existing release step
        id: release-exists
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.get-version.outputs.SemVer2 }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
              echo "Release $TAG already exists; workflow_dispatch will refresh it."
            else
              echo "Release $TAG already exists; skipping release creation (no-op republish)."
            fi
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      # target_commitish pins the tag to the exact built commit (GitCommitId), not the moving branch ref.
      # The Docker-only target ships no asset, so fail_on_unmatched_files is omitted (the glob matches zero files).
      - name: Create GitHub release step
        if: ${{ steps.release-exists.outputs.exists == 'false' || github.event_name == 'workflow_dispatch' }}
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          generate_release_notes: true
          tag_name: ${{ needs.get-version.outputs.SemVer2 }}
          target_commitish: ${{ needs.get-version.outputs.GitCommitId }}
          prerelease: ${{ inputs.branch != 'main' }}
          files: |
            LICENSE
            README.md
            ./Publish/*
