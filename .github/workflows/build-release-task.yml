name: Build project release task

on:
  workflow_call:
    inputs:
      github:
        required: false
        type: boolean
        default: false
      dockerhub:
        required: false
        type: boolean
        default: false
      ref:
        required: false
        type: string
        default: ''
      # Drives tags/prerelease: main => latest/non-prerelease, else develop.
      branch:
        required: true
        type: string
      # Reduced, never-published build for PR feedback; disables every push below.
      smoke:
        required: false
        type: boolean
        default: false
      # Docker build gate; a PR smoke run sets it from the paths-filter.
      enable_docker:
        required: false
        type: boolean
        default: true

jobs:

  get-version:
    name: Get version information job
    uses: ./.github/workflows/get-version-task.yml
    secrets: inherit
    with:
      ref: ${{ inputs.ref }}

  build-docker:
    name: Build Docker job
    if: ${{ inputs.enable_docker }}
    needs: [get-version]
    uses: ./.github/workflows/build-docker-task.yml
    secrets: inherit
    with:
      # Pin to the built commit so the image matches the release tag even if the
      # branch advances mid-run.
      ref: ${{ needs.get-version.outputs.GitCommitId }}
      branch: ${{ inputs.branch }}
      smoke: ${{ inputs.smoke }}
      push: ${{ inputs.dockerhub && !inputs.smoke }}

  github-release:
    name: Publish GitHub release job
    # Also gate on !smoke so a smoke run can't create a release.
    if: ${{ inputs.github && !inputs.smoke }}
    runs-on: ubuntu-latest
    needs: [get-version, build-docker]

    steps:

      # Check out the built commit so release files match the tag.
      - name: Checkout code step
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.get-version.outputs.GitCommitId }}

      # Collect any release-asset-<branch>-* artifacts. The Docker build pushes
      # directly and uploads none, so this matches nothing (which succeeds) and
      # the release carries just the tag + LICENSE/README.
      - name: Download release asset artifacts step
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-asset-${{ inputs.branch }}-*
          merge-multiple: true
          path: ./Publish

      # The weekly publisher may re-run an already-released SemVer2; skip
      # recreating an existing release (Docker tags and base-image refresh still
      # ship).
      - name: Check for existing release step
        id: release-exists
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.get-version.outputs.SemVer2 }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
              echo "Release $TAG already exists; workflow_dispatch will refresh it."
            else
              echo "Release $TAG already exists; skipping release creation (no-op republish)."
            fi
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      # Pin the tag to the built commit; without target_commitish GitHub tags
      # the default branch. Skip when the tag exists, but let workflow_dispatch
      # through to refresh it.
      - name: Create GitHub release step
        if: ${{ steps.release-exists.outputs.exists == 'false' || github.event_name == 'workflow_dispatch' }}
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          generate_release_notes: true
          tag_name: ${{ needs.get-version.outputs.SemVer2 }}
          target_commitish: ${{ needs.get-version.outputs.GitCommitId }}
          prerelease: ${{ inputs.branch != 'main' }}
          files: |
            LICENSE
            README.md
            ./Publish/*
