name: Test pull request action

on:
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # Detect whether a PR touches the Docker build so we only smoke-build when it
  # changed. Build-workflow files are intentionally NOT in the filter: a path
  # filter can't tell a logic change in a build workflow from an action-version
  # bump. A workflow-only change is therefore not smoke-built - the reusable
  # workflows are exercised instead by the next run that uses them (a later code
  # PR's smoke build, or the scheduled/publish run); lint workflow edits with
  # `actionlint` locally before pushing (there is no CI lint job). On
  # `workflow_dispatch` (no PR base to diff against) the target is forced on so
  # a manual run is a full smoke build.
  changes:
    name: Detect changed targets job
    runs-on: ubuntu-latest
    # `dorny/paths-filter` lists the PR's changed files via the GitHub API
    # (this job does not check out the tree), which needs `pull-requests: read`.
    # The repo's default GITHUB_TOKEN is restricted, so grant it explicitly.
    permissions:
      contents: read
      pull-requests: read
    outputs:
      docker: ${{ github.event_name == 'pull_request' && steps.filter.outputs.docker || 'true' }}
    steps:
      - name: Filter changed paths step
        id: filter
        if: ${{ github.event_name == 'pull_request' }}
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            docker:
              - 'Docker/**'
              # The pinned ESPHome version (build-arg + tag) lives here, and the
              # NBGV release version comes from version.json - a change to either
              # should rebuild the image.
              - '.github/esphome-version.json'
              - 'version.json'

  # Fast PR feedback: build the Docker image in smoke mode (amd64-only, no
  # publishing). Validates against the PR's base branch by passing
  # `branch: github.base_ref`. Skipped entirely when the Docker context did not
  # change (e.g. a docs-only PR).
  smoke-build:
    name: Smoke build changed targets job
    needs: [changes]
    if: ${{ needs.changes.outputs.docker == 'true' }}
    uses: ./.github/workflows/build-release-task.yml
    secrets: inherit
    with:
      smoke: true
      # Do not publish anything from a PR.
      github: false
      dockerhub: false
      # Check out the PR head by SHA (not head_ref): the head SHA is reachable
      # in the base repo via refs/pull/N/head even for fork PRs, whereas the
      # head_ref branch name does not exist in the base repo for forks and
      # would fail checkout. Validate it in the base branch's configuration.
      # `workflow_dispatch` has no pull_request payload, so fall back to the
      # triggering ref.
      ref: ${{ github.event.pull_request.head.sha || github.ref_name }}
      branch: ${{ github.base_ref || github.ref_name }}
      enable_docker: ${{ needs.changes.outputs.docker == 'true' }}

  # TODO: Workaround for GitHub Actions not supporting status checks on conditional jobs
  # https://github.com/orgs/community/discussions/12395#discussioncomment-12970019
  # This job's name is bound to the branch ruleset as the required status check
  # context - do NOT rename it (see AGENTS.md "Workflow YAML Conventions").
  check-workflow-status:
    name: Check pull request workflow status
    runs-on: ubuntu-latest
    needs:
      [ changes, smoke-build ]
    if: always()
    steps:
      - name: Check workflow results step
        run: |
          set -euo pipefail
          exit_on_result() {
            if [[ "$2" == "failure" || "$2" == "cancelled" ]]; then
              echo "Job '$1' failed or was cancelled."
              exit 1
            fi
          }
          # The paths-filter job MUST succeed: if it failed we don't know whether
          # the Docker target changed, so a Docker-changing PR could merge with
          # its smoke build silently skipped. Treat anything other than success
          # as a block.
          if [[ "${{ needs.changes.result }}" != "success" ]]; then
            echo "Job 'changes' did not succeed (${{ needs.changes.result }}); refusing to pass."
            exit 1
          fi
          # smoke-build may be legitimately skipped (Docker context unchanged) -
          # `skipped` passes, only failure/cancelled blocks.
          exit_on_result "smoke-build" "${{ needs.smoke-build.result }}"
