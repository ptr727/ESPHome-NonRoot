name: Publish project release action

# Triggered-Docker publisher, one run = one branch (the trigger ref). The weekly schedule rebuilds `main` only
# (multi-arch image + GitHub release; refreshes the `latest`/version tags and the python:3.14-slim base for CVEs).
# A path-scoped push to main publishes when the upstream-check App commits a new `upstream-version.json` pin; the
# plan job (publish-plan-task.yml) gates it to the App identity, so a human pin edit does not publish. A manual dispatch publishes the branch it is started from (main => latest, develop => prerelease/`develop`).
# Building only the trigger branch keeps github.ref aligned with the branch being versioned, so NBGV classifies it
# with no matrix and no cross-branch ref leak.
#
# Ordinary code merges do NOT publish: only a bot pin change (push to main, gated to the App identity), a schedule, or a dispatch does.
# Each branch self-releases: main builds multi-arch, develop builds amd64 only. CI/validation runs separately on
# push (test-pull-request).
on:
  workflow_dispatch:
  schedule:
    # Weekly rebuild/publish of main (Mon 02:00 UTC) to pick up base-image updates.
    - cron: '0 2 * * MON'
  # Publish main when the upstream-check App commits a new pin here (the plan job gates it to the App identity); a develop prerelease comes via dispatch.
  push:
    branches: [main]
    paths: [upstream-version.json]

# Global, ref-independent group so two publishes never overlap (a schedule + a dispatch + a pin push, or back-to-back
# dispatches). cancel-in-progress: false so a publish is never cancelled mid-release.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:

  # Single source of the release-gate decision (publish? stable?); the publish job gates on its output instead of
  # re-testing event/actor/branch. See publish-plan-task.yml for the policy.
  plan:
    name: Plan release job
    uses: ./.github/workflows/publish-plan-task.yml
    with:
      event_name: ${{ github.event_name }}
      actor: ${{ github.actor }}
      ref_name: ${{ github.ref_name }}

  # Publish the trigger branch in full (Docker image + GitHub release). The schedule and a bot pin push both run on
  # main; a dispatch runs on whatever branch it is started from. build-release-task validates, versions, and tags
  # that one branch; the no-op guard skips release creation when the version is unchanged while the Docker push
  # still refreshes the base image.
  publish:
    name: Publish project release job
    needs: [plan]
    if: ${{ needs.plan.outputs.publish == 'true' }}
    uses: ./.github/workflows/build-release-task.yml
    secrets: inherit
    permissions:
      contents: write
    with:
      ref: ${{ github.ref_name }}
      branch: ${{ github.ref_name }}
      smoke: false
      github: true
      dockerhub: true
