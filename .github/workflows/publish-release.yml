name: Publish project release action

on:
  push:
    branches: [ main, develop ]
  workflow_dispatch:
  schedule:
    # Weekly full publish of both branches; merges otherwise only smoke-test.
    - cron: '0 2 * * MON'

# Real publishes share one global group so they serialize (they push shared
# tags/caches regardless of ref); non-publishing pushes get a unique group and
# only run the no-op `setup` job.
concurrency:
  group: ${{ (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || vars.PUBLISH_ON_MERGE == 'true') && github.workflow || format('{0}-noop-{1}', github.workflow, github.run_id) }}
  # Queue, don't cancel: a cancelled publish can leave a half-pushed tag set or
  # release.
  cancel-in-progress: false

jobs:

  # Decide which branches to publish and whether to publish: push publishes only
  # when PUBLISH_ON_MERGE is true; schedule/dispatch publish both branches.
  setup:
    name: Resolve publish plan job
    runs-on: ubuntu-latest
    outputs:
      branches: ${{ steps.plan.outputs.branches }}
      publish: ${{ steps.plan.outputs.publish }}
    steps:
      - name: Compute publish plan step
        id: plan
        env:
          # Unset reads as empty string -> two-phase default.
          PUBLISH_ON_MERGE: ${{ vars.PUBLISH_ON_MERGE }}
        run: |
          set -euo pipefail
          # A schedule or dispatch builds BOTH branches in the matrix regardless of the triggering ref (a push builds
          # only the pushed branch). Dispatching on a non-default ref makes the main leg mis-version (NBGV can't resolve
          # the public main ref), publishing a malformed non-prerelease release that GitHub marks "Latest". Fail fast:
          # dispatch only from the default branch.
          if [[ "${{ github.event_name }}" == "workflow_dispatch" \
                && "${{ github.ref_name }}" != "${{ github.event.repository.default_branch }}" ]]; then
            echo "::error::Dispatch publish-release from the default branch (${{ github.event.repository.default_branch }}); the matrix builds both branches. Re-dispatch on the default branch."
            exit 1
          fi
          case "${{ github.event_name }}" in
            push)
              branches='["${{ github.ref_name }}"]'
              if [[ "${PUBLISH_ON_MERGE:-}" == "true" ]]; then
                publish=true
              else
                publish=false
              fi
              ;;
            *)
              # schedule / workflow_dispatch
              branches='["main","develop"]'
              publish=true
              ;;
          esac
          echo "Event=${{ github.event_name }} branches=$branches publish=$publish"
          echo "branches=$branches" >> "$GITHUB_OUTPUT"
          echo "publish=$publish" >> "$GITHUB_OUTPUT"

  # Full publish per planned branch; the matrix lets one run publish both main
  # and develop.
  publish:
    name: Publish project release job
    needs: [setup]
    if: ${{ needs.setup.outputs.publish == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        branch: ${{ fromJSON(needs.setup.outputs.branches) }}
    uses: ./.github/workflows/build-release-task.yml
    secrets: inherit
    permissions:
      contents: write
    with:
      ref: ${{ matrix.branch }}
      branch: ${{ matrix.branch }}
      smoke: false
      github: true
      dockerhub: true

  # Caller-gated to main: the badge and Docker Hub overview have no per-branch context, so they update only when main
  # is among the published branches (a develop-only push skips them). One invocation, not a per-branch matrix leg.
  date-badge:
    name: Create BYOB date badge job
    needs: [setup, publish]
    if: ${{ needs.setup.outputs.publish == 'true' && contains(fromJSON(needs.setup.outputs.branches), 'main') }}
    uses: ./.github/workflows/build-datebadge-task.yml
    secrets: inherit
    permissions:
      contents: write

  docker-readme:
    name: Publish Docker Hub readme job
    needs: [setup, publish]
    if: ${{ needs.setup.outputs.publish == 'true' && contains(fromJSON(needs.setup.outputs.branches), 'main') }}
    uses: ./.github/workflows/publish-docker-readme-task.yml
    secrets: inherit
    permissions:
      contents: read
    with:
      ref: main
      repositories: '["ptr727/esphome-nonroot"]'

  # Release artifacts are an intra-run handoff (durable copies live on the GitHub release), so leaving them accumulates
  # against the small account-wide storage quota; delete them once every consumer has read them.
  cleanup-artifacts:
    name: Delete workflow artifacts job
    needs: [setup, publish, date-badge, docker-readme]
    if: ${{ always() && needs.setup.outputs.publish == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Delete workflow artifacts step
        # continue-on-error: best-effort housekeeping must never red the run, even on an unexpected failure.
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if ! ids=$(gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts --paginate \
            --jq '.artifacts[].id'); then
            echo "::warning::Could not list run artifacts; skipping cleanup (storage may not be freed)."
            ids=""
          fi
          for artifact_id in $ids; do
            gh api --method DELETE "repos/${{ github.repository }}/actions/artifacts/$artifact_id" \
              || echo "::warning::Failed to delete artifact $artifact_id; continuing."
          done
