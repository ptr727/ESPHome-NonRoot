name: Publish project release action

on:
  push:
    branches: [ main, develop ]
  workflow_dispatch:
  schedule:
    # Weekly full build/publish of both branches on Mondays at 02:00 UTC.
    # This is the guaranteed publisher in the default two-phase model: routine
    # merges only smoke-test, and this scheduled run republishes everything
    # (also refreshing the Docker base image, e.g. `python:3.13-slim`).
    - cron: '0 2 * * MON'

# Real publishes (schedule, dispatch, or push when PUBLISH_ON_MERGE is set)
# share a single GLOBAL, ref-independent group so they serialize: they push
# both branches' shared Docker tags + caches and create GitHub releases for
# both regardless of the triggering ref, so a ref-scoped group would let a
# scheduled run (ref=main) and a manual dispatch (ref=develop) run concurrently
# and double-push. Non-publishing `push` runs (the two-phase default) get a
# unique per-run group so they don't queue behind - or delay - a real publish;
# they only execute the no-op `setup` job and skip everything else.
concurrency:
  group: ${{ (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || vars.PUBLISH_ON_MERGE == 'true') && github.workflow || format('{0}-noop-{1}', github.workflow, github.run_id) }}
  # Documented exception to the standard `cancel-in-progress: true` (see
  # AGENTS.md "Workflow YAML Conventions"): cancelling a publish mid-flight can
  # leave a partially pushed multi-arch tag set or a half-created GitHub
  # release. Queue instead of cancel so each publish runs to completion.
  cancel-in-progress: false

jobs:

  # Decide WHICH branches to publish and WHETHER to publish at all:
  #   - push        -> publish only the pushed branch, and only when the
  #                    `PUBLISH_ON_MERGE` repository variable is `true`
  #                    (opt-in legacy continuous-release). Unset/false => the
  #                    default two-phase model: merges don't publish.
  #   - schedule    -> always publish BOTH branches (the weekly full build).
  #   - dispatch    -> always publish BOTH branches (manual on-demand publish).
  setup:
    name: Resolve publish plan job
    runs-on: ubuntu-latest
    outputs:
      branches: ${{ steps.plan.outputs.branches }}
      publish: ${{ steps.plan.outputs.publish }}
    steps:
      - name: Compute publish plan step
        id: plan
        env:
          # Repository variable (Settings -> Actions -> Variables). Unset reads
          # as empty string, so the default is the two-phase model.
          PUBLISH_ON_MERGE: ${{ vars.PUBLISH_ON_MERGE }}
        run: |
          set -euo pipefail
          case "${{ github.event_name }}" in
            push)
              branches='["${{ github.ref_name }}"]'
              if [[ "${PUBLISH_ON_MERGE:-}" == "true" ]]; then
                publish=true
              else
                publish=false
              fi
              ;;
            *)
              # schedule / workflow_dispatch
              branches='["main","develop"]'
              publish=true
              ;;
          esac
          echo "Event=${{ github.event_name }} branches=$branches publish=$publish"
          echo "branches=$branches" >> "$GITHUB_OUTPUT"
          echo "publish=$publish" >> "$GITHUB_OUTPUT"

  # Full build + publish of every target for each planned branch. The branch
  # matrix lets a single scheduled run publish both `main` (Release/`latest`,
  # non-prerelease) and `develop` (Debug/`develop`, prerelease) - each leg
  # checks out and versions its own branch via the threaded `ref`/`branch`.
  publish:
    name: Publish project release job
    needs: [setup]
    if: ${{ needs.setup.outputs.publish == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        branch: ${{ fromJSON(needs.setup.outputs.branches) }}
    uses: ./.github/workflows/build-release-task.yml
    secrets: inherit
    permissions:
      contents: write
    with:
      ref: ${{ matrix.branch }}
      branch: ${{ matrix.branch }}
      smoke: false
      # Push to GitHub (release) and Docker Hub (image). This repo ships only
      # the Docker target; the template's nuget/pypi flags and jobs were
      # removed per AGENTS.md "Release Model" per-target subsetting.
      github: true
      dockerhub: true

  # Push the static Docker Hub repository overview after a real publish.
  # Mirrors ptr727/NxWitness's `publish-docker-readme-task.yml` and is wired
  # like `date-badge` below; the README tracks `main` so it matches the
  # `:latest` image. Runs only on real publishes (gated on `setup.publish`),
  # never on smoke.
  docker-readme:
    name: Publish docker hub readme job
    needs: [setup, publish]
    if: ${{ needs.setup.outputs.publish == 'true' }}
    uses: ./.github/workflows/publish-docker-readme-task.yml
    secrets: inherit
    with:
      ref: main

  date-badge:
    name: Create BYOB date badge job
    needs: [setup, publish]
    if: ${{ needs.setup.outputs.publish == 'true' }}
    strategy:
      matrix:
        branch: ${{ fromJSON(needs.setup.outputs.branches) }}
    uses: ./.github/workflows/build-datebadge-task.yml
    secrets: inherit
    permissions:
      contents: write
    with:
      # The badge task self-gates to `main`; the develop leg is a no-op.
      branch: ${{ matrix.branch }}
