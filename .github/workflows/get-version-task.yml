name: Get version information task

on:
  workflow_call:
    inputs:
      # Git ref to check out and version. Empty string falls back to the
      # caller's default checkout ref (`github.ref`), preserving the
      # original behavior. The publisher passes an explicit branch so a
      # scheduled run - which always reports `github.ref` as the default
      # branch - can still compute NBGV versions for `develop` too.
      ref:
        required: false
        type: string
        default: ''
    outputs:
      # Version information outputs
      SemVer2:
        value: ${{ jobs.get-version.outputs.SemVer2 }}
      AssemblyVersion:
        value: ${{ jobs.get-version.outputs.AssemblyVersion }}
      AssemblyFileVersion:
        value: ${{ jobs.get-version.outputs.AssemblyFileVersion }}
      AssemblyInformationalVersion:
        value: ${{ jobs.get-version.outputs.AssemblyInformationalVersion }}
      # Full SHA of the commit NBGV computed the version from. Used to pin the
      # GitHub release tag to the exact built commit (immutable), rather than a
      # moving branch ref.
      GitCommitId:
        value: ${{ jobs.get-version.outputs.GitCommitId }}

jobs:

  get-version:
    name: Get version information job
    runs-on: ubuntu-latest
    outputs:
      SemVer2: ${{ steps.nbgv.outputs.SemVer2 }}
      AssemblyVersion: ${{ steps.nbgv.outputs.AssemblyVersion }}
      AssemblyFileVersion: ${{ steps.nbgv.outputs.AssemblyFileVersion }}
      AssemblyInformationalVersion: ${{ steps.nbgv.outputs.AssemblyInformationalVersion }}
      GitCommitId: ${{ steps.nbgv.outputs.GitCommitId }}

    steps:

      - name: Setup .NET SDK step
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: 10.x

      - name: Checkout code step
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      # `dotnet/nbgv` is intentionally floated on `master` rather than
      # pinned to a commit SHA - a deliberate deviation from the
      # AGENTS.md "pin third-party actions to a commit SHA" rule,
      # documented here so the deviation isn't accidentally "fixed" by
      # a future reviewer. Justification:
      #   - The upstream tag stream is effectively dormant - the latest
      #     tag `v0.5.1` lags well behind `master` and fixes accumulate
      #     on `master` between tag bumps.
      #   - Dependabot's GitHub Actions ecosystem tracks tagged
      #     releases. A SHA pinned to a post-`v0.5.1` `master` commit
      #     would either receive no Dependabot updates (silently stale)
      #     or get an attempted downgrade PR to `v0.5.1`'s SHA. Neither
      #     beats just floating on `master`.
      #   - Upstream owner is Microsoft (`dotnet/`), so the
      #     "tag-/branch-retargeting risk" the AGENTS.md rule guards
      #     against is materially lower than for a random author.
      # Revisit if `dotnet/nbgv` resumes regular tagged releases.
      - name: Run Nerdbank.GitVersioning tool step
        id: nbgv
        uses: dotnet/nbgv@master
