name: Build Docker image task

on:
  workflow_call:
    inputs:
      push:
        required: false
        type: boolean
        default: false
      ref:
        required: false
        type: string
        default: ''
      # Drives the image tags: main => latest + pinned version, else develop.
      branch:
        required: true
        type: string
      # amd64 only, no push, no shared cache write - fast PR feedback.
      smoke:
        required: false
        type: boolean
        default: false

jobs:

  get-version:
    name: Get version information job
    uses: ./.github/workflows/get-version-task.yml
    secrets: inherit
    with:
      ref: ${{ inputs.ref }}

  build-docker:
    name: Build Docker image job
    runs-on: ubuntu-latest
    needs: [get-version]

    steps:

      - name: Checkout step
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref }}

      # Pinned ESPHome + device-builder versions from the committed state file;
      # the esphome version drives the image tag, both become build-args.
      - name: Get pinned versions step
        id: esphome
        run: |
          set -euo pipefail
          version="$(jq -r .version esphome-version.json)"
          device_builder="$(jq -r .device_builder_version esphome-version.json)"
          if [[ -z "$version" || "$version" == "null" || -z "$device_builder" || "$device_builder" == "null" ]]; then
            echo "::error::Could not read versions from esphome-version.json"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "device_builder=$device_builder" >> "$GITHUB_OUTPUT"

      # QEMU emulates arm64; skip for amd64-only smoke builds.
      - name: Setup QEMU step
        if: ${{ !inputs.smoke }}
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
        with:
          platforms: linux/amd64,linux/arm64

      - name: Setup Buildx step
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        with:
          platforms: ${{ inputs.smoke && 'linux/amd64' || 'linux/amd64,linux/arm64' }}

      # Log in only when publishing; smoke/PR builds read the public cache
      # anonymously, so fork PRs (no secret access) can still build.
      - name: Login to Docker Hub step
        if: ${{ inputs.push }}
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Docker build and push step
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          # Context is Docker/ (the Dockerfile only copies entrypoint/).
          context: ./Docker
          # Also gate on !smoke so a smoke run can never publish.
          push: ${{ inputs.push && !inputs.smoke }}
          file: ./Docker/Dockerfile
          # main: latest + the pinned version tag; develop: develop only (the
          # second line is empty off main, which build-push-action ignores).
          tags: |
            docker.io/ptr727/esphome-nonroot:${{ inputs.branch == 'main' && 'latest' || 'develop' }}
            ${{ inputs.branch == 'main' && format('docker.io/ptr727/esphome-nonroot:{0}', steps.esphome.outputs.version) || '' }}
          platforms: ${{ inputs.smoke && 'linux/amd64' || 'linux/amd64,linux/arm64' }}
          # Read both branches' caches (near-identical layers); write only this
          # branch's, and only when publishing. Branch-scoped so the publisher's
          # main/develop legs don't clobber one shared cache.
          cache-from: |
            type=registry,ref=docker.io/ptr727/esphome-nonroot:buildcache-main
            type=registry,ref=docker.io/ptr727/esphome-nonroot:buildcache-develop
          cache-to: ${{ inputs.push && !inputs.smoke && format('type=registry,ref=docker.io/ptr727/esphome-nonroot:buildcache-{0},mode=max,ignore-error=true', inputs.branch) || '' }}
          build-args: |
            LABEL_VERSION=${{ needs.get-version.outputs.SemVer2 }}
            ESPHOME_VERSION=${{ steps.esphome.outputs.version }}
            DEVICE_BUILDER_VERSION=${{ steps.esphome.outputs.device_builder }}

