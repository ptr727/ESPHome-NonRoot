# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
# Each ecosystem appears once per branch (main + develop) so both stay current independently; rationale in
# AGENTS.md "Branching Model". This repo ships a Docker image only: github-actions plus the Docker base image.
version: 2
updates:

  # github-actions, main
  - package-ecosystem: "github-actions"
    target-branch: "main"
    directory: "/"
    schedule:
      interval: "daily"
    groups:
      actions-deps:
        patterns:
          - "*"

  # github-actions, develop
  - package-ecosystem: "github-actions"
    target-branch: "develop"
    directory: "/"
    schedule:
      interval: "daily"
    groups:
      actions-deps:
        patterns:
          - "*"

  # docker (Docker/Dockerfile base image), main
  - package-ecosystem: "docker"
    target-branch: "main"
    directory: "/Docker"
    schedule:
      interval: "daily"
    groups:
      docker-deps:
        patterns:
          - "*"

  # docker (Docker/Dockerfile base image), develop
  - package-ecosystem: "docker"
    target-branch: "develop"
    directory: "/Docker"
    schedule:
      interval: "daily"
    groups:
      docker-deps:
        patterns:
          - "*"
